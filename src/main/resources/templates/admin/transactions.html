<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>M3R Node Admin — Transactions</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#07080f;--surface:#0d0f1a;--panel:#111422;--border:#1e2235;--accent:#00d4aa;--warn:#f0a500;--danger:#e84560;--text:#e2e6f3;--muted:#5a6180;--mono:'JetBrains Mono',monospace;--ui:'Sora',sans-serif}
    body{margin:0;font-family:var(--ui);background:var(--bg);color:var(--text)}
    a{color:inherit;text-decoration:none}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);position:fixed;inset:0;padding:20px}
    .main{margin-left:220px;padding:20px}
    .topbar{height:64px;display:flex;align-items:center;justify-content:space-between}
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px}
    select,input{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font:inherit}
    input{min-width:260px}
    .btn{background:var(--panel);border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:9px 14px;font-weight:600;cursor:pointer}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#07080f}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
    table{width:100%;border-collapse:collapse}
    thead th{font-size:11px;color:var(--muted);padding:10px;border-bottom:1px solid var(--border);text-align:left}
    tbody td{padding:12px;border-bottom:1px solid var(--border)}
    .mono{font-family:var(--mono)}.muted{color:var(--muted)}
    .pill-confirm{background:rgba(0,212,170,.08);color:var(--accent);padding:4px 8px;border-radius:10px}
    .pill-pending{background:rgba(240,165,0,.08);color:var(--warn);padding:4px 8px;border-radius:10px}
    .pill-rejected{background:rgba(232,69,96,.08);color:var(--danger);padding:4px 8px;border-radius:10px}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div style="font-family:var(--mono);color:var(--accent);font-size:20px">M3R <span style="color:var(--text);font-weight:400;margin-left:6px">NODE ADMIN</span></div>
    <nav style="margin-top:18px;color:var(--muted);font-size:13px;display:grid;gap:8px">
      <a href="/admin">Dashboard</a>
      <a href="/admin/accounts">Accounts</a>
      <a href="/admin/transactions" style="color:var(--accent)">Transactions</a>
      <a href="/admin/escrows">Escrows</a>
      <a href="/admin/blocks">Blocks</a>
      <a href="/admin/validators">Validators</a>
    </nav>
  </aside>
  <main class="main">
    <header class="topbar"><div style="font-weight:600">Transactions</div><div class="muted mono" th:text="${network}">mainnet</div></header>

    <form class="toolbar" method="get" th:action="@{/admin/transactions}">
      <select name="network">
        <option th:each="net : ${networks}" th:value="${net}" th:text="${net}" th:selected="${net == network}"></option>
      </select>
      <input type="search" name="q" placeholder="Search hash or status" th:value="${q}">
      <button class="btn primary" type="submit">Search</button>
      <a class="btn" th:href="@{/admin/transactions(network=${network})}">Clear</a>
    </form>

    <div class="panel">
      <div style="overflow:auto">
        <table>
          <thead><tr><th>HASH</th><th>STATUS</th><th>NETWORK</th><th>CREATED</th></tr></thead>
          <tbody>
            <tr th:each="tx : ${transactions}">
              <td class="mono" th:text="${tx.hash}">hash</td>
              <td>
                <span th:switch="${tx.status}">
                  <span th:case="'CONFIRMED'" class="pill-confirm">CONFIRMED</span>
                  <span th:case="'REJECTED'" class="pill-rejected">REJECTED</span>
                  <span th:case="*" class="pill-pending" th:text="${tx.status}">PENDING</span>
                </span>
              </td>
              <td th:text="${tx.network}">net</td>
              <td class="muted mono" th:text="${#dates.format(new java.util.Date(tx.createdAt), 'yyyy-MM-dd HH:mm:ss')}">time</td>
            </tr>
            <tr th:if="${transactions == null or #lists.isEmpty(transactions)}"><td colspan="4" class="muted">No transactions found.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</body>
</html>
