<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>M3R Node Admin — Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#07080f;--surface:#0d0f1a;--panel:#111422;--border:#1e2235;--accent:#00d4aa;--text:#e2e6f3;--muted:#5a6180;--mono:'JetBrains Mono',monospace;--ui:'Sora',sans-serif}
    body{margin:0;font-family:var(--ui);background:var(--bg);color:var(--text)}.sidebar{width:220px;background:var(--surface);position:fixed;inset:0;padding:20px}
    .main{margin-left:220px;padding:20px}.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
    table{width:100%;border-collapse:collapse}thead th{font-size:11px;color:var(--muted);padding:10px;border-bottom:1px solid var(--border)}tbody td{padding:12px;border-bottom:1px solid var(--border)}
    .mono{font-family:var(--mono)}.muted{color:var(--muted)}.copy-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--mono)}
  </style>
</head>
<body>
  <aside class="sidebar"><div style="font-family:var(--mono);color:var(--accent);font-size:20px">M3R <span style="color:var(--text);font-weight:400;margin-left:6px">NODE ADMIN</span></div></aside>
  <main class="main">
    <header style="height:64px;display:flex;align-items:center;justify-content:space-between"><div style="font-weight:600">Accounts</div><div class="muted mono">Server-rendered list</div></header>
    <div class="panel">
      <div style="overflow:auto">
        <table>
          <thead><tr><th>ADDRESS</th><th>NETWORK</th><th>BALANCE</th><th>NONCE</th></tr></thead>
          <tbody>
            <tr th:each="acc : ${accounts}">
              <td class="mono"><span th:text="${#strings.substring(acc.address,0,12)} + '...' + ${#strings.substring(acc.address, acc.address.length()-6)}">addr</span>
                <button class="copy-btn" type="button" th:attr="data-addr=${acc.address}" onclick="copyAddr(this)">Copy</button></td>
              <td><span th:text="${acc.network}">net</span></td>
              <td class="mono" style="text-align:right" th:text="${acc.balance}">0</td>
              <td class="mono" th:text="${acc.nonce}">0</td>
            </tr>
            <tr th:if="${accounts == null or #lists.isEmpty(accounts)}"><td colspan="4" class="muted">No accounts</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script>function copyAddr(b){navigator.clipboard.writeText(b.getAttribute('data-addr')).then(()=>{b.textContent='Copied';setTimeout(()=>b.textContent='Copy',900)});}</script>
</body>
</html>
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - M3R Wallet Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: #764ba2;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .controls select, .controls input, .controls button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-right: 10px;
        }

        .controls button {
            background: #667eea;
            color: white;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #764ba2;
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        table tr:hover {
            background: #f5f5f5;
        }

        .address {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Accounts Management</h1>
            <div class="nav-links">
                <a href="/admin">Dashboard</a>
                <a href="/admin/accounts">Accounts</a>
                <a href="/admin/transactions">Transactions</a>
                <a href="/admin/escrows">Escrows</a>
            </div>
        </div>

        <div class="controls">
            <select id="networkSelect" th:value="${network}">
                <option th:each="net : ${networks}" th:value="${net}" th:text="${net}" th:selected="${net == network}"></option>
            </select>
            <input id="searchInput" type="search" placeholder="Search address, balance, nonce" th:value="${q}">
            <button onclick="window.location = '/admin/accounts?network=' + document.getElementById('networkSelect').value + '&q=' + encodeURIComponent(document.getElementById('searchInput').value)">Search</button>
            <button onclick="window.location = '/admin/accounts?network=' + document.getElementById('networkSelect').value">Clear</button>
        </div>

        <div class="table-container">
            <h2 style="margin-bottom: 20px; color: #333;" th:text="'Accounts - ' + ${network}"></h2>
            
            <div th:if="${accounts.isEmpty()}" class="empty">
                <p>No accounts found on this network</p>
            </div>

            <table th:if="${!accounts.isEmpty()}">
                <thead>
                    <tr>
                        <th>Address</th>
                        <th>Balance</th>
                        <th>Nonce</th>
                        <th>Network</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="acc : ${accounts}">
                        <td class="address" th:text="${@adminView.address(acc.address)}"></td>
                        <td th:text="${@adminView.amount(acc.balance)}"></td>
                        <td th:text="${acc.nonce}"></td>
                        <td th:text="${acc.network}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
