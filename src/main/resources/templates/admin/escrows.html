<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>M3R Node Admin — Escrows</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#07080f;--panel:#111422;--surface:#0d0f1a;--border:#1e2235;--accent:#00d4aa;--text:#e2e6f3;--muted:#5a6180;--mono:'JetBrains Mono',monospace;--ui:'Sora',sans-serif}
    body{margin:0;font-family:var(--ui);background:var(--bg);color:var(--text)}
    a{color:inherit;text-decoration:none}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);position:fixed;inset:0;padding:20px}
    .main{margin-left:220px;padding:20px}
    .topbar{height:64px;display:flex;align-items:center;justify-content:space-between}
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px}
    select,input{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font:inherit}
    input{min-width:260px}
    .btn{background:var(--panel);border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:9px 14px;font-weight:600;cursor:pointer}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#07080f}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
    table{width:100%;border-collapse:collapse}
    thead th{font-size:11px;color:var(--muted);padding:10px;border-bottom:1px solid var(--border);text-align:left}
    tbody td{padding:12px;border-bottom:1px solid var(--border)}
    .mono{font-family:var(--mono)}.muted{color:var(--muted)}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div style="font-family:var(--mono);color:var(--accent);font-size:20px">M3R <span style="color:var(--text);font-weight:400;margin-left:6px">NODE ADMIN</span></div>
    <nav style="margin-top:18px;color:var(--muted);font-size:13px;display:grid;gap:8px">
      <a href="/admin">Dashboard</a>
      <a href="/admin/accounts">Accounts</a>
      <a href="/admin/transactions">Transactions</a>
      <a href="/admin/escrows" style="color:var(--accent)">Escrows</a>
      <a href="/admin/blocks">Blocks</a>
      <a href="/admin/validators">Validators</a>
    </nav>
  </aside>
  <main class="main">
    <header class="topbar"><div style="font-weight:600">Escrows</div><div class="muted mono" th:text="${network}">mainnet</div></header>

    <form class="toolbar" method="get" th:action="@{/admin/escrows}">
      <select name="network">
        <option th:each="net : ${networks}" th:value="${net}" th:text="${net}" th:selected="${net == network}"></option>
      </select>
      <input type="search" name="q" placeholder="Search escrow, address, amount" th:value="${q}">
      <button class="btn primary" type="submit">Search</button>
      <a class="btn" th:href="@{/admin/escrows(network=${network})}">Clear</a>
    </form>

    <div class="panel">
      <div style="overflow:auto">
        <table>
          <thead><tr><th>ESCROW ID</th><th>BUYER</th><th>SELLER</th><th>ARBITER</th><th>AMOUNT</th><th>CREATED</th></tr></thead>
          <tbody>
            <tr th:each="e : ${escrows}">
              <td class="mono" th:text="${e.escrowId}">id</td>
              <td class="mono" th:text="${@adminView.address(e.buyer)}">buyer</td>
              <td class="mono" th:text="${@adminView.address(e.seller)}">seller</td>
              <td class="mono" th:text="${@adminView.address(e.arbiter)}">arbiter</td>
              <td class="mono" th:text="${@adminView.amount(e.amount)}">0.00</td>
              <td class="muted mono" th:text="${#dates.format(new java.util.Date(e.createdAt), 'yyyy-MM-dd HH:mm:ss')}">time</td>
            </tr>
            <tr th:if="${escrows == null or #lists.isEmpty(escrows)}"><td colspan="6" class="muted">No escrows found.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</body>
</html>
